<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Task Dashboard</title>
<style>
:root{
  --bg:#14110f; --panel:#1d1916; --panel2:#241f1b; --ink:#f5f3ee; --muted:#a8a29a;
  --line:#2c2723; --accent:#e0a458; --green:#3a8f5f; --red:#c2553f; --blue:#5b8fb0;
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
button{font:inherit;color:inherit;cursor:pointer}
.hidden{display:none!important}

/* Top bar */
.topbar{position:sticky;top:0;z-index:20;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  padding:10px 12px;background:rgba(20,17,15,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.brand{font-weight:800;letter-spacing:.3px;margin-right:4px}
.brand .dot{color:var(--accent)}
.date{color:var(--muted);font-size:13px}
.build{color:var(--accent);font-size:11px;border:1px solid var(--line);border-radius:6px;padding:1px 6px}
.search{flex:1;min-width:160px;background:var(--panel);border:1px solid var(--line);color:var(--ink);
  border-radius:10px;padding:9px 12px;font-size:15px}
.tb-btn{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:14px}
.tb-btn.on{background:var(--accent);border-color:var(--accent);color:#14110f;font-weight:700}
.tb-btn.accent{background:var(--accent);border-color:var(--accent);color:#14110f;font-weight:700}

/* Filter chips */
.filters{display:flex;flex-direction:column;gap:6px;padding:8px 12px;border-bottom:1px solid var(--line)}
.filter-group{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.filter-group>.lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;width:56px;flex:none}
.chip[draggable]{cursor:grab}
.chip{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:13px;color:var(--muted)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#14110f;font-weight:700}
.chip .n{opacity:.6;margin-left:4px;font-size:11px}
.filter-more{max-height:0;overflow:hidden;transition:max-height .2s}
.filter-group.expanded .filter-more{max-height:400px}

/* Board */
.board{position:relative;padding:14px 12px 80px;min-height:70vh}
@keyframes flash{0%,45%{box-shadow:0 0 0 4px var(--accent)}100%{box-shadow:0 0 0 0 transparent}}
.panel.flash{animation:flash 1.4s ease-out}
.panel.bulbhalo{box-shadow:0 0 0 2px var(--accent);border-color:var(--accent)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;break-inside:avoid;-webkit-column-break-inside:avoid;margin-bottom:12px}
.panel.wide{grid-column:span 1}
.panel-head{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:8px 10px;border-bottom:1px solid var(--line);position:sticky;top:0}
.panel-head h3{margin:0;font-size:14px;font-weight:800;letter-spacing:.2px;flex:1 1 auto;min-width:64px}
.panel-head .phead-ctrl,.panel-head .mini,.panel-head .send-list{padding:2px 5px;font-size:11px}
.panel-head .send-list{margin-left:auto;padding:2px 7px}
.panel-head .count{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:1px 9px;font-size:12px;color:var(--muted)}
.panel-body{padding:6px;display:flex;flex-direction:column;gap:4px;min-height:0;flex:1;overflow-y:auto;max-height:calc(100vh - 110px)}
.panel.drop-hover{outline:2px dashed var(--accent);outline-offset:-4px}
.panel.stub .panel-body{align-items:center;justify-content:center;color:var(--muted);font-size:13px;text-align:center;padding:18px}
/* Done / Don't care / Auto-sort: one-line drop bubbles — header IS the drop zone */
.panel.micro{height:40px!important;min-height:0;overflow:hidden}
.panel.micro .panel-body,.panel.micro .panel-sub{display:none}
.panel.micro .panel-head{border-bottom:none}
/* P/L/S/C quick-assign bubbles beside the ✕ */
.plscb{background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:5px;font-size:9px;font-weight:800;padding:2px 4px;line-height:1;cursor:pointer}
.plscb:hover{color:var(--ink);border-color:var(--accent)}

/* Task card */
.task{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:3px 7px;cursor:grab;position:relative}
.task:active{cursor:grabbing}
.task.blink{animation:blink 1s ease-in-out infinite;border-color:var(--accent)}
@keyframes blink{0%,100%{box-shadow:0 0 0 0 rgba(224,164,88,.0)}50%{box-shadow:0 0 0 3px rgba(224,164,88,.55)}}
.task .name{font-weight:600;font-size:13px;line-height:1.25;padding-right:82px}
.topright{position:absolute;top:4px;right:6px;display:flex;flex-direction:row;align-items:center;gap:4px}
.donex{background:none;border:none;color:var(--green);cursor:pointer;font-size:15px;line-height:1;padding:4px 7px;font-weight:800;border-radius:6px}
.add-inline .submit-sm{font-size:11px;padding:0 8px}
.details{display:none;margin-top:6px}
.task.open .details{display:block}
.task .meta{color:var(--muted);font-size:11px;margin-top:0;display:flex;gap:5px;flex-wrap:wrap}
.task .tag{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:0 6px;font-size:10px}
.task .next{margin-top:5px;font-size:11px;color:var(--accent);background:rgba(224,164,88,.1);border-radius:6px;padding:5px 8px}
.task .next.ndone{color:var(--green);background:rgba(58,143,95,.12)}
.task.drop-before{border-top:2px solid var(--accent)}
textarea.inp{min-height:110px;resize:vertical;font-family:inherit}
.cal-ev{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:7px;padding:4px 8px}
.cal-when{font-size:10px;color:var(--blue);font-weight:700}
.cal-title{font-size:12px;font-weight:600;line-height:1.2}
.cal-loc{font-size:10px;color:var(--muted)}
.cal-now{border-left-color:var(--accent);animation:blink 1.1s ease-in-out infinite}
.joinbtn.stopblink{background:var(--line);color:var(--muted);margin-left:6px}
.txt-item{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 9px}
.txt-from{font-weight:700;font-size:13px}
.txt-when{color:var(--muted);font-size:11px;font-weight:400}
.txt-prev{color:var(--muted);font-size:12px;margin-top:2px}
.txt-reply{width:100%;margin-top:6px;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 9px;font-size:14px}
.mfilters{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.mfbtn{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 4px;font-size:12px;font-weight:700}
.madd{display:flex;gap:6px;margin-bottom:10px}
.madd input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:12px;font-size:16px}
.madd button{background:var(--accent);border:none;color:#14110f;border-radius:11px;padding:0 18px;font-weight:800;font-size:15px}
.mrow2{position:relative;overflow:hidden;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:7px 9px;margin-bottom:4px}
.mrow2-top{display:flex;align-items:center;gap:8px}
.mrow-acts{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.trayb{background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:5px 9px;font-size:13px;font-weight:800;line-height:1}
.trayb.on{background:var(--accent);border-color:var(--accent);color:#14110f}
.mrow-name{flex:1;font-weight:600;font-size:15px}
.dp-sort{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:7px;font-size:11px;padding:2px 4px}
#ptr{position:fixed;top:-56px;left:50%;transform:translateX(-50%);z-index:60;background:var(--panel);border:1px solid var(--accent);color:var(--accent);border-radius:999px;padding:7px 16px;font-size:13px;font-weight:700;transition:top .15s ease}
.mfold{text-align:center;color:var(--muted);font-size:12px;margin:12px 0 6px;border-top:1px dashed var(--line);padding-top:8px}
.mnum{font-weight:400;font-size:12px;color:var(--muted);margin-top:2px}
.mcall{background:var(--green);color:#fff;border:none;border-radius:10px;padding:9px 15px;font-size:18px;text-decoration:none;display:inline-block}
.mcall.add{background:var(--panel);color:var(--muted);border:1px solid var(--line);font-size:14px}
.mcall.done2{background:var(--panel);color:var(--green);border:1px solid var(--line)}
.mrow-inner{display:flex;align-items:center;gap:7px;transition:transform .12s ease}
.mrow2[data-hint]::after{content:attr(data-hint);position:absolute;top:0;left:14px;height:100%;display:flex;align-items:center;font-size:13px;font-weight:800;color:var(--accent);pointer-events:none}
.mcall.move{background:var(--panel);color:var(--ink);border:1px solid var(--line);font-size:14px;font-weight:800;padding:9px 12px}
.mcall.bell{background:var(--panel);color:var(--accent);border:1px solid var(--line);font-size:17px}
.mcall.bell.on{background:var(--accent);color:#14110f;border-color:var(--accent)}
.drawer-handle{display:flex;align-items:center;justify-content:center;gap:8px;flex-direction:column;padding:6px 0 4px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;user-select:none}
.drawer-handle .dh-grip{width:38px;height:4px;border-radius:3px;background:var(--line)}
.drawer-handle.open .dh-label{color:var(--accent)}
.topdrawer{max-height:0;overflow:hidden;transition:max-height .28s ease;opacity:.0}
.topdrawer.open{max-height:1400px;opacity:1;margin-bottom:8px}
.datepop{position:fixed;z-index:9999;background:var(--panel);border:1px solid var(--accent);border-radius:10px;padding:8px;box-shadow:0 12px 34px rgba(0,0,0,.55)}
.datepop .inp{width:200px}
.dp-row{display:flex;gap:6px;margin-top:6px;justify-content:flex-end}
.dobadge{display:inline-block;font-size:11px;color:var(--blue);background:rgba(91,143,176,.12);border-radius:6px;padding:2px 7px;margin:4px 0 0}
.dobadge.due{color:var(--accent);background:rgba(224,164,88,.14)}
.mas{display:flex;gap:4px;margin:3px 0 1px;flex-wrap:wrap}
.masb{background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:6px;padding:2px 8px;font-size:12px;font-weight:800;line-height:1.3}
.masb.on{background:var(--accent);border-color:var(--accent);color:#14110f}
@media(max-width:640px){
  #bulkBtn,#meetBtn,#gridBtn,#picBtn{display:none}
  .board{padding:10px 10px 90px;min-height:0}
  body{font-size:17px}
  .card-task,.task .name{font-size:15px}
  .donex,.reveal{font-size:19px;padding:7px 11px}
  .masb{font-size:16px;padding:6px 13px}
  .mini{font-size:14px;padding:7px 10px}
  .mrow-name{font-size:17px}
  .mcall{font-size:18px;padding:8px 11px}
  .mcall.move{font-size:13px;padding:8px 10px}
  .mrow-inner{gap:5px}
  .panel-body{max-height:none}
  .panel{margin-bottom:2px}
}
.calrefresh{margin:0 0 0 6px;border:none;cursor:pointer;font-size:13px;line-height:1;padding:3px 8px}
.calrefresh.spin{animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.joinbtn{display:inline-block;margin-top:4px;background:var(--blue);color:#14110f;text-decoration:none;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:800}
.search-results{position:fixed;top:58px;left:50%;transform:translateX(-50%);width:min(536px,92vw);max-height:56vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;z-index:45;box-shadow:0 14px 36px rgba(0,0,0,.55)}
.search-results .sr{padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer}
.search-results .sr:hover{background:var(--panel2)}
.search-results .sr .m{color:var(--muted);font-size:12px}
.task .row{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.mini{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:4px 7px;font-size:12px;line-height:1}
.mini.done{color:var(--green)} .mini.on{background:var(--accent);border-color:var(--accent);color:#14110f}
.task .age{font-size:10px;color:var(--muted)}

/* Grid overlay */
#grid{position:fixed;inset:0;z-index:15;pointer-events:none;display:none}
#grid.on{display:block}
.gcell{position:absolute;border-right:1px solid rgba(224,164,88,.18);border-bottom:1px solid rgba(224,164,88,.18)}
.glabel{position:absolute;font-size:10px;color:rgba(224,164,88,.7);padding:2px 3px;font-weight:700}

/* Modal */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;width:100%;max-width:440px;max-height:88vh;overflow:auto}
.modal h3{margin:0 0 12px}
.field{display:block;margin:8px 0}
.field .lbl{display:block;font-size:12px;color:var(--muted);margin-bottom:3px}
.inp{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:10px 12px;font-size:15px}
textarea.inp{min-height:70px;resize:vertical}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.btn{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 14px}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#14110f;font-weight:700}
.btn.ghost{background:transparent}
.note{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.5}
/* Action feedback pops mid-screen (not the bottom), by request */
.toast{position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);background:var(--panel2);border:1px solid var(--accent);
  border-radius:12px;padding:12px 20px;font-size:15px;font-weight:600;z-index:60;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.fab{position:fixed;right:16px;bottom:16px;width:54px;height:54px;border-radius:50%;background:var(--accent);
  border:none;color:#14110f;font-size:28px;z-index:30;box-shadow:0 8px 20px rgba(0,0,0,.4)}
.empty{color:var(--muted);font-size:12px;text-align:center;padding:7px}
a.tellink{color:var(--green);text-decoration:none}
.demo-banner{margin:8px 12px 0;padding:8px 12px;background:rgba(224,164,88,.14);border:1px solid var(--accent);border-radius:10px;font-size:13px;display:flex;gap:10px;align-items:center}
.demo-banner button{margin-left:auto;padding:6px 12px}
.drag-handle{cursor:grab;color:var(--muted);font-size:13px;letter-spacing:-2px;user-select:none}
.phead-ctrl{background:none;border:1px solid var(--line);border-radius:7px;color:var(--muted);font-size:11px;padding:2px 6px}
.phead-ctrl:hover{color:var(--ink)}
.reveal{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px 7px;line-height:1;border-radius:6px}
.killx{background:none;border:none;color:var(--red);cursor:pointer;font-size:15px;padding:4px 7px;line-height:1}
.reveal:hover,.donex:hover{background:var(--line)}
.panel-sub{font-size:11px;color:var(--muted);padding:0 12px 6px;margin-top:-6px;border-bottom:1px solid var(--line)}
.task.dragging{opacity:.35}
.task.bigtix{border-color:var(--accent);background:rgba(224,164,88,.08);box-shadow:inset 3px 0 0 var(--accent)}
.panel.dragging{opacity:.35}
.ack-block{background:rgba(58,143,95,.08);border:1px solid rgba(58,143,95,.3);border-radius:8px;padding:7px 9px;margin-bottom:6px}
.ack-h{font-size:11px;font-weight:700;color:var(--green);margin-bottom:4px}
.ack-i{font-size:12px;color:var(--muted);line-height:1.5}
.add-inline{display:flex;gap:6px;margin-bottom:8px}
.add-inline input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 9px;font-size:13px}
.add-inline button{background:var(--accent);border:none;color:#14110f;border-radius:8px;padding:0 12px;font-weight:800;font-size:16px}
.more-btn{background:var(--panel);border:1px dashed var(--line);color:var(--muted);border-radius:8px;padding:6px;font-size:12px;width:100%}
.idea{display:flex;gap:6px;align-items:flex-start;font-size:13px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 9px}
.idea button{background:none;border:none;color:var(--muted);cursor:pointer;margin-left:auto}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">Task<span class="dot">·</span>Board</span>
  <span class="date" id="date"></span>
  <span class="build" id="buildTag" title="Last update"></span>
  <span class="build" id="taskCount" title="Total open tasks"></span>
  <input class="search" id="search" placeholder="Search tasks…">
  <button class="tb-btn" id="bulkBtn" title="Bulk add — paste a list">📋 Bulk</button>
  <button class="tb-btn" id="meetBtn" title="Today's meetings">📅 Meetings</button>
  <button class="tb-btn" id="gridBtn" title="Toggle reference grid">▦ Grid</button>
  <button class="tb-btn" id="picBtn" title="Photo → list">📷</button>
  <button class="tb-btn" id="undoBtn" title="Undo last action (⌘Z)">↩ Undo</button>
  <button class="tb-btn accent" id="refreshBtn">↻ Refresh</button>
  <button class="tb-btn" id="settingsBtn">⚙︎</button>
</div>

<div class="filters" id="filters"></div>

<div class="board" id="board"></div>

<div id="searchResults" class="search-results hidden"></div>
<button class="fab" id="addBtn">＋</button>
<div id="grid"></div>
<input type="file" id="picInput" accept="image/*" class="hidden">

<script>
"use strict";
const BUILD='2026-07-23 11:54';   // replaced with deploy date/time by deploy.sh
// Changelog shown on the 🔧 wrench (newest first). deploy.sh also appends a line to changelog.md.
const CHANGES=[
  {v:'2026-07-22 · undo & layout', d:'↩ Undo (⌘Z) for done/move/snooze/delete/panel-drags. Thinner 252px columns. Dragging a panel keeps it where you drop it — others slide to the nearest free slot ON screen, nothing pushed below the fold. Done/Don\'t-care/Auto-sort are one-line bubbles. Build age back in the top bar (hover/click 🔧 for build). Toasts pop mid-screen. Daily sweep: untouched Still-open kicked 10d, uncategorized auto-sorted, stale drafts cleared. 📌 pin = survives daily reset. P/L/S/C bubbles next to ✕ + C-move on desktop. 🔥 Priority, 🎲 Project spotlight, 📡 From-outside panels. Texts open in Messages on click.'},
  {v:'2026-07-21 · drawer', d:'Pull-down drawer at top for filters + Incoming (hidden by default). Task rows simplified to 3 actions (📞/🔍, Move, ✓) with bigger text; swipe left = snooze, swipe right = done. Added tasks appear instantly. + button adds straight to Incoming. Incoming auto-sort. New Email + Still Open sections. Bell on Calls. Build hidden from header — tap 🔧 for this log.'},
  {v:'2026-07-21 · 21:18', d:'Wrench tooltip, category-name tap opens full list, date ranges exclude today, add-to-morning/afternoon, snooze hides from lists, pull-to-refresh, below-fold layout.'},
];
/* ============================================================
   Task Dashboard — single-file, no build step.
   Data: Airtable (paste token in ⚙︎ Settings, stored locally).
   Extra state (section, flags, next steps, phone) lives in
   localStorage keyed by record id — no Airtable schema changes.
   ============================================================ */

const LS = {
  cfg:'tb.cfg', aug:'tb.aug', meta:'tb.meta'
};
const cfg = JSON.parse(localStorage.getItem(LS.cfg)||'{}');
cfg.baseId = cfg.baseId||'appdDTNBbVrp6hVOv';
cfg.tableId = cfg.tableId||'tblLpOdHqxoP3siYk';
let aug = JSON.parse(localStorage.getItem(LS.aug)||'{}');
let meta = JSON.parse(localStorage.getItem(LS.meta)||'{}');
let tasks = [];
let demo = false;
let activeBulb = null;   // {dim,val} when a project/lead/sub bulb is opened on the board
let improvements = [];   // Airtable-backed improvement notes (Improvements table)
let dragChip = null;     // {dim,val} while dragging a filter bulb to reorder
let calendar = [];       // Airtable-cached calendar events (Calendar table)
let texts = [];          // unanswered texts (Texts table), populated by the agent
let outbox = [];         // queued follow-ups awaiting your approval (Outbox table)
let lastFetchAt = 0;     // when data was last refreshed (for the counter)
let blinkOff = null;     // which current-meeting the user silenced (resets on refresh / new meeting)
let flashBulb = false;   // flash a bulb panel when opened from a filter chip
let bulbSort = '';       // how the opened bulb/list is sorted
let mobileDrawerOpen = false;   // top pull-down drawer (filters + incoming)
let incomingSort = localStorage.getItem('incomingSort') || 'new';   // Incoming auto-sort
function sortItems(items,mode){
  const a=[...items];
  if(mode==='days') a.sort((x,y)=>daysOpen(y)-daysOpen(x));
  else if(mode==='priority') a.sort((x,y)=>((y.priorityRemote||priorityScore(y))-(x.priorityRemote||priorityScore(x))));
  else if(mode==='project') a.sort((x,y)=>(x.project||'~').localeCompare(y.project||'~'));
  else if(mode==='lead') a.sort((x,y)=>(x.lead||'~').localeCompare(y.lead||'~'));
  else if(mode==='sub') a.sort((x,y)=>(x.sub||'~').localeCompare(y.sub||'~'));
  else if(mode==='old') a.sort((x,y)=>new Date(x.createdTime||0)-new Date(y.createdTime||0));
  else if(mode==='new') a.sort((x,y)=>new Date(y.createdTime||0)-new Date(x.createdTime||0));
  return a;
}

function inAddedRange(t,key){
  if(!t.createdTime) return false;
  const c=new Date(t.createdTime).getTime(), now=Date.now(), d=new Date();
  const startToday=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();
  if(key==='today') return c>=startToday;
  if(key==='yest') return c>=startToday-86400000 && c<startToday;
  // ranges EXCLUDE today (no day-zero items) — end at start of today
  if(key==='2') return c>=startToday-2*86400000 && c<startToday;
  if(key==='7') return c>=startToday-7*86400000 && c<startToday;
  if(key==='30') return c>=startToday-30*86400000 && c<startToday;
  return false;
}
function notSnoozed(t){ return !(A(t.id).snoozeUntil>Date.now()); }

function priorityScore(t){

  if(a.blink) s+=40;

  if(a.nextStep||t.nextStepRemote) s+=6;
  if(t.typeRemote==='call' || /^\s*call\b/i.test(t.name||'')) s+=5;
  if(a.awaiting) s+=10;

}

const AT = 'https://api.airtable.com/v0/';
function atUrl(){ return AT+cfg.baseId+'/'+encodeURIComponent(cfg.tableId); }
function flat(v){ if(v==null)return''; if(Array.isArray(v))return v.map(x=>x&&typeof x==='object'?(x.name||x.id||''):x).filter(Boolean).join(', '); if(typeof v==='object')return v.name||v.id||''; return String(v);}
async function atFetch(){
  if(!cfg.apiKey){ toast('Add your Airtable key in ⚙︎ Settings'); return; }
  let offset,out=[],g=0;
  do{
    const u=new URL(atUrl()); u.searchParams.set('pageSize','100'); if(offset)u.searchParams.set('offset',offset);
    const r=await fetch(u,{headers:{Authorization:'Bearer '+cfg.apiKey}});
    if(!r.ok){ toast('Airtable error '+r.status); return; }
    const d=await r.json();
    out=out.concat((d.records||[]).map(rec=>({
      id:rec.id, createdTime:rec.createdTime,
      name:flat(rec.fields.Task), project:flat(rec.fields.Project),
      lead:flat(rec.fields.SBLead), sub:flat(rec.fields.Sub),
      status:flat(rec.fields.Status)||'Open',
      phoneRemote:flat(rec.fields.Phone), nextStepRemote:flat(rec.fields.NextStep),
      sourceRemote:flat(rec.fields.Source),
      typeRemote:(flat(rec.fields.Type)||'').toLowerCase(),
      slotRemote:(flat(rec.fields.MeetingSlot)||'').toLowerCase(),
      sectionRemote:(flat(rec.fields.Section)||'').toLowerCase(),
      priorityRemote:+flat(rec.fields.Priority)||0,
      doDate:(flat(rec.fields.DoDate)||'').slice(0,10),
      updatedAt:flat(rec.fields.UpdatedAt)
    })));
    offset=d.offset;
  }while(offset&&++g<50);
  tasks=out; demo=false; lastFetchAt=Date.now(); blinkOff=null; meta.lastRefresh=todayStr(); saveMeta();
  // backfill: push this device's local placements up to Airtable so other devices see them
  for(const t of tasks){ const s=A(t.id).section; if(s && t.sectionRemote!==s){ t.sectionRemote=s; atPatch(t.id,{Section:s}); } }
  // Incoming holds only today's items — anything aged out drops to Backlog
  for(const t of tasks){ if((A(t.id).section==='incoming'||t.sectionRemote==='incoming') && daysOpen(t)>0){ A(t.id).section=null; t.sectionRemote=''; atPatch(t.id,{Section:''}); } }
  saveAug(); await fetchImprovements(); await fetchCalendar();
  await fetchTexts(); await fetchOutbox(); await fetchEmails();
  const doneN=improvements.filter(i=>i.status==='Done').length;
  if(doneN>(meta.ackSeen||0)) toast('✓ '+(doneN-(meta.ackSeen||0))+' improvement'+(doneN-(meta.ackSeen||0)===1?'':'s')+' addressed — open Improvements');
  await dailyKick();
  render();
}

    body.appendChild(d);});
  p.appendChild(body);
  p.addEventListener('drop',e=>{e.preventDefault();const d=e.dataTransfer.getData('text/plain');if(d&&d.startsWith('panel:'))reorderPanels(d.slice(6),'tosend');});
  return p;
}

// ── Daily reset: each new day, log the board then clear placements EXCEPT
//    Big Ticket / Next Up / Now-Focus (your priorities stay put). ──
function dailyReset(){
  const today=todayISO();
  if(meta.lastReset===today) return;
  const keep=new Set(['bigticket','nextup','focus']);
  if(meta.lastReset){ // log the day that just ended
    const snap=Object.keys(aug).filter(id=>aug[id].section).map(id=>({id,section:aug[id].section}));
    meta.resetLog=meta.resetLog||{}; meta.resetLog[meta.lastReset]=snap;
    const ks=Object.keys(meta.resetLog).sort(); while(ks.length>14) delete meta.resetLog[ks.shift()];
  }
  // 📌 pinned tasks stay wherever you put them until done
  for(const id of Object.keys(aug)){ const s=aug[id].section; if(s && !keep.has(s) && !aug[id].pin){ aug[id].section=null; if(cfg.apiKey)atPatch(id,{Section:''}); } }
  meta.lastReset=today; saveAug(); saveMeta();
}
// Runs once a day AFTER data loads: kick untouched Still-open items 10 days out,
// auto-categorize anything with no project/lead, and drop stale outbox drafts.
async function dailyKick(){
  const today=todayISO();
  if(meta.lastKick===today || demo) return;
  let kicked=0,sorted=0;
  for(const t of stillOpenItems()){ A(t.id).snoozeUntil=Date.now()+10*86400000; kicked++; }
  for(const t of tasks){
    if(t.status!=='Open'||t.project||t.lead||A(t.id).pin) continue;
    const g=guessCategory(t); if(!g.project&&!g.lead) continue;
    if(g.project){t.project=g.project;} if(g.lead){t.lead=g.lead;}
    atPatch(t.id,{...(g.project?{Project:g.project}:{}),...(g.lead?{SBLead:g.lead}:{})}); sorted++;
  }
  // stale unapproved drafts (2+ days old) get cleared — if you didn't send it, it wasn't important
  for(const o of outbox.filter(o=>o.status==='Draft' && (Date.now()-new Date(o.createdTime||Date.now()).getTime())>2*86400000)) deleteOutbox(o.id);
  meta.lastKick=today; saveAug(); saveMeta();
  if(kicked||sorted) toast('🌅 Daily sweep: '+(kicked?kicked+' stale kicked 10d':'')+(kicked&&sorted?' · ':'')+(sorted?sorted+' auto-sorted':''));
}

function daysOpen(t){ if(!t.createdTime)return 0; return Math.floor((Date.now()-new Date(t.createdTime))/86400000);}
function lastTouch(t){ return Math.max(t.createdTime?+new Date(t.createdTime):0, A(t.id).lastTouched||0);}
function touch(id){ A(id).lastTouched=Date.now(); saveAug(); }
let toastT;
function toast(m){ let e=document.querySelector('.toast'); if(!e){e=document.createElement('div');e.className='toast';document.body.appendChild(e);} e.textContent=m; clearTimeout(toastT); toastT=setTimeout(()=>e.remove(),2800);}

// ── Undo: every destructive/move action pushes an inverse; ↩ or ⌘Z pops it. ──
const undoStack=[];
function pushUndo(desc,fn){ undoStack.push({desc,fn}); if(undoStack.length>25)undoStack.shift(); }
async function undoLast(){
  const u=undoStack.pop(); if(!u){ toast('Nothing to undo'); return; }
  try{ await u.fn(); }catch(e){}
  saveAug(); saveMeta(); render(); toast('↩ Undid: '+u.desc);
}

/* ---------- Filtering ---------- */
function visible(t){
  if(filters.project && t.project!==filters.project) return false;
  if(filters.lead && t.lead!==filters.lead) return false;
  if(filters.sub && t.sub!==filters.sub) return false;
  return true;
}

/* "Still open?" = aging & untouched, likely dead/irrelevant */
function stillOpenItems(){
  return tasks.filter(t=> t.status==='Open' && visible(t) && !(A(t.id).snoozeUntil>Date.now()) &&
    (Date.now()-lastTouch(t))/86400000 >= 10 );
}

/* ---------- Render ---------- */
const expanded = new Set();   // ephemeral: which capped sections are showing all

function orderedPanels(){
  const def=[...BUCKETS.map(b=>b.id).filter(id=>id!=='backlog'),'priority','spotlight','external','stillopen','tosend','ideas',...STUBS.map(s=>s.id)];
  let ord=(meta.order&&meta.order.length)?meta.order.slice():def.slice();
  def.forEach(id=>{ if(!ord.includes(id)) ord.push(id); });
  return ord.filter(id=>def.includes(id) && id!=='backlog');   // backlog hidden
}
function reorderPanels(fromId,toId){
  if(fromId===toId)return;
  let ord=orderedPanels().filter(x=>x!==fromId);
  const i=ord.indexOf(toId); ord.splice(i<0?ord.length:i,0,fromId);
  meta.order=ord; saveMeta(); render();
}
function cycleWidth(id){ meta.width=meta.width||{}; meta.width[id]=((meta.width[id]||1)%3)+1; saveMeta(); render(); }
function cycleHeight(id){ meta.height=meta.height||{}; meta.height[id]=((meta.height[id]||2)%3)+1; saveMeta(); render(); }
function heightPx(id){ const h=meta.height&&meta.height[id]; return h?({1:'150px',2:'400px',3:'700px'})[h]:null; }
// Manual within-section task ordering (drag a task onto another to resort).
function orderRows(items,sec){
  const ord=meta.taskOrder&&meta.taskOrder[sec]; if(!ord)return items;
  return [...items].sort((a,b)=>{const ia=ord.indexOf(a.id),ib=ord.indexOf(b.id);return (ia<0?1e9:ia)-(ib<0?1e9:ib);});
}
function reorderTask(sec,fromId,beforeId){
  meta.taskOrder=meta.taskOrder||{};
  let ids=tasks.filter(t=>t.status==='Open' && sectionOf(t)===sec).map(t=>t.id);
  const ord=meta.taskOrder[sec];
  if(ord){ const inOrd=ord.filter(x=>ids.includes(x)); ids=[...inOrd,...ids.filter(x=>!inOrd.includes(x))]; }
  ids=ids.filter(x=>x!==fromId);
  const i=ids.indexOf(beforeId); ids.splice(i<0?ids.length:i,0,fromId);
  meta.taskOrder[sec]=ids; saveMeta(); touch(fromId); saveAug(); render();
}
function setMax(id){
  const cur=(meta.max&&meta.max[id])||'';
  const n=prompt('Max tasks to show in this section (blank = show all):',cur); if(n===null)return;
  meta.max=meta.max||{}; if(!n.trim())delete meta.max[id]; else meta.max[id]=Math.max(1,parseInt(n)||1);
  saveMeta(); render();
}

// Re-rendering must never lose where you were scrolled in a list (e.g. after ✓ Clear).
function saveScrolls(){
  const s={};
  document.querySelectorAll('.panel').forEach(p=>{ const b=p.querySelector('.panel-body'); if(!b||!b.scrollTop)return;
    const k=p.dataset.section||((p.querySelector('h3')||{}).textContent||''); if(k)s[k]=b.scrollTop; });
  return s;
}
function restoreScrolls(s){
  const apply=()=>{ document.querySelectorAll('.panel').forEach(p=>{
    const k=p.dataset.section||((p.querySelector('h3')||{}).textContent||'');
    if(k&&s[k]){ const b=p.querySelector('.panel-body'); if(b)b.scrollTop=s[k]; } }); };
  apply(); setTimeout(apply,50);   // immediate + once more after layout settles
}
function render(){
  const scrolls=saveScrolls();
  document.getElementById('date').textContent = new Date().toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
  renderBanner();
  const tc=document.getElementById('taskCount'); if(tc)tc.textContent='📋 '+tasks.filter(t=>t.status==='Open').length+' open';
  const board=document.getElementById('board'); board.innerHTML='';
  const filt=document.getElementById('filters');
  if(isMobileView()){ filt.style.display='none'; renderMobile(board); restoreScrolls(scrolls); return; }
  filt.style.display=''; renderFilters();
  const notSnoozed=t=>!(A(t.id).snoozeUntil>Date.now());
  const openVisible = tasks.filter(t=>t.status==='Open' && visible(t) && notSnoozed(t));
  orderedPanels().forEach(id=>{
    const stub=STUBS.find(s=>s.id===id);
    if(id==='stillopen') board.appendChild(panelEl('stillopen','❓ Still open?', stillOpenItems(), false));
    else if(id==='priority') board.appendChild(panelEl('priority','🔥 Priority', priorityList().filter(t=>visible(t)&&notSnoozed(t)).slice(0,10), false));
    else if(id==='spotlight') board.appendChild(spotlightPanel());
    else if(id==='external') board.appendChild(panelEl('external','📡 From outside', openVisible.filter(t=>t.sourceRemote), false));
    else if(id==='ideas') board.appendChild(ideasPanel());
    else if(id==='calendar') board.appendChild(calendarPanel());
    else if(id==='untexted') board.appendChild(textsPanel());
    else if(id==='emails') board.appendChild(emailsPanel());
    else if(id==='tosend') board.appendChild(outboxPanel());
    else if(stub) board.appendChild(stubPanel(stub));
    else { const b=BUCKETS.find(x=>x.id===id); if(!b)return;
      let items = (b.id==='done'||b.id==='dontcare'||b.id==='autosort') ? [] : openVisible.filter(t=>sectionOf(t)===b.id);
      if(b.id==='incoming') items=items.filter(t=>daysOpen(t)===0);   // Incoming = today only
      board.appendChild(panelEl(b.id,b.name,items,true)); }

  layoutFreeform(board);

// Email links open in the Superhuman APP (not Gmail) — convert the Gmail
// thread link to Superhuman's deep-link scheme.
function shLink(url){
  const m=(url||'').match(/#[^/]*\/([0-9a-f]{12,})/i);

}

/* A project/lead/sub "bulb" opened as a live board panel (drag tasks out of it) */
function bulbPanel(){
  const {dim,val,label}=activeBulb;
  const isCat = dim==='category'; const isAdded = dim==='added';
  const fmap={project:'Project',lead:'SBLead',sub:'Sub'};
  let items = isAdded ? tasks.filter(t=>inAddedRange(t,val)).sort((a,b)=>new Date(b.createdTime||0)-new Date(a.createdTime||0))
              : isCat ? (val==='stillopen'?stillOpenItems():val==='priority'?priorityList():val==='today'?todayPlan():val==='yestboard'?yesterdayBoard():tasks.filter(t=>t.status==='Open'&&sectionOf(t)===val))
              : tasks.filter(t=>t.status==='Open'&&t[dim]===val);
  items=items.filter(notSnoozed);
  if(bulbSort) items=sortItems(items,bulbSort);
  const title = isAdded ? ('🗓 Added: '+label) : isCat ? label : '🔎 '+val;
  const p=document.createElement('div'); p.className='panel'; p.dataset.section='bulb';
  meta.width=meta.width||{}; p.style.gridColumn='span '+(meta.width.bulb||1);
  const head=document.createElement('div'); head.className='panel-head';
  const sortOpts=[['','Sort'],['new','Newest'],['old','Oldest'],['days','Days open'],['priority','Priority'],['project','Project'],['lead','Lead'],['sub','Sub']];
  head.innerHTML=`<button class="phead-ctrl" data-prev title="Previous">◀</button><h3>${esc(title)}</h3><button class="phead-ctrl" data-next title="Next">▶</button>`+
    `<select class="dp-sort" title="Sort by">${sortOpts.map(o=>`<option value="${o[0]}"${bulbSort===o[0]?' selected':''}>${o[1]}</option>`).join('')}</select>`+
    `<button class="mini send-list" title="Send this list">⤴</button><span class="count">${items.length}</span><button class="phead-ctrl" data-close title="Close">✕</button>`;
  head.querySelector('.dp-sort').onchange=e=>{ bulbSort=e.target.value; render(); };
  head.querySelector('.send-list').onclick=()=>sendList(isCat?label:(dim+': '+val),items);
  head.querySelector('[data-close]').onclick=()=>{activeBulb=null;render();};
  const cycle=delta=>{
    if(isCat){ let i=CATEGORIES.findIndex(c=>c.id===val)+delta; if(i<0)i=CATEGORIES.length-1; if(i>=CATEGORIES.length)i=0; activeBulb={dim:'category',val:CATEGORIES[i].id,label:CATEGORIES[i].name}; render(); return; }
    if(isAdded){ let i=ADDED_RANGES.findIndex(r=>r.key===val)+delta; if(i<0)i=ADDED_RANGES.length-1; if(i>=ADDED_RANGES.length)i=0; activeBulb={dim:'added',val:ADDED_RANGES[i].key,label:ADDED_RANGES[i].name}; render(); return; }
    const vals=orderedVals(dim,countsFor(dim)); if(!vals.length)return; let i=vals.indexOf(val)+delta; if(i<0)i=vals.length-1; if(i>=vals.length)i=0; activeBulb={dim,val:vals[i]}; render();
  };
  head.querySelector('[data-prev]').onclick=()=>cycle(-1);
  head.querySelector('[data-next]').onclick=()=>cycle(1);
  p.appendChild(head);
  const body=document.createElement('div'); body.className='panel-body';
  if(!items.length){const e=document.createElement('div');e.className='empty';e.textContent='Nothing open here.';body.appendChild(e);}
  items.forEach(t=>body.appendChild(taskEl(t,isAdded?'added':'bulb')));
  if(isCat && val==='calls'){ const past=pastCalls();
    if(past.length){ const h=document.createElement('div'); h.className='ack-h'; h.style.margin='8px 0 4px'; h.textContent='📞 Past calls — last 14 days'; body.appendChild(h);
      past.forEach(t=>{ const d=document.createElement('div'); d.className='txt-item';
        d.innerHTML='<div class="txt-prev">✓ '+esc(cleanName(t))+' <span class="txt-when">'+esc((t.updatedAt||'').slice(0,10))+'</span></div>';
        body.appendChild(d); }); } }
  if(!isAdded && !(isCat && ['stillopen','priority','yestboard','today'].includes(val))){
    const add=document.createElement('div'); add.className='add-inline';
    add.innerHTML='<input placeholder="Add to '+esc(isCat?label:val)+'…"><button>＋</button>';
    const go=async()=>{const inp=add.querySelector('input');const v=inp.value.trim();if(!v)return;inp.value='';
      const t=await atCreate(v); if(!t)return;
      if(isCat){ setSection(t.id,val); if(val==='calls'){A(t.id).type='call'; atPatch(t.id,{Type:'call'});} }
      else { t[dim]=val; await atPatch(t.id,{[fmap[dim]]:val}); }
      render(); const n=document.querySelector('.panel[data-section="bulb"] .add-inline input'); if(n)n.focus();};
    add.querySelector('button').onclick=go; add.querySelector('input').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
    body.appendChild(add);
  }
  p.appendChild(body);
  // drop a task here to ASSIGN this project/lead/sub — or move into this category
  p.addEventListener('dragover',e=>{e.preventDefault();p.classList.add('drop-hover');});
  p.addEventListener('dragleave',e=>{if(!p.contains(e.relatedTarget))p.classList.remove('drop-hover');});
  p.addEventListener('drop',async e=>{e.preventDefault();p.classList.remove('drop-hover');
    const d=e.dataTransfer.getData('text/plain'); if(!d||d==='chip'||d.startsWith('panel:'))return;
    if(isAdded)return;
    const t=tasks.find(x=>x.id===d); if(!t)return;
    if(isCat){ setSection(d,val); if(val==='calls'){A(d).type='call'; atPatch(d,{Type:'call'});} touch(d); toast('Moved → '+label); render(); return; }
    t[dim]=val; touch(d); saveAug(); toast('Set '+dim+' → '+val); render();
    await atPatch(t.id,{[fmap[dim]]:val});
  });
  p.classList.add('bulbhalo');
  if(flashBulb){ p.classList.add('flash'); flashBulb=false; }
  return p;
}

// 📥 Incoming on the phone — same rule as desktop (today's items only), so what
// you drop into Incoming on the Mac shows up here (Section syncs via Airtable).
function sortIncoming(items){
  const arr=items.slice();
  if(incomingSort==='old') arr.sort((a,b)=>new Date(a.createdTime||0)-new Date(b.createdTime||0));
  else if(incomingSort==='az') arr.sort((a,b)=>cleanName(a).localeCompare(cleanName(b)));
  else if(incomingSort==='pri') arr.sort((a,b)=>priorityScore(b)-priorityScore(a));
  else arr.sort((a,b)=>new Date(b.createdTime||0)-new Date(a.createdTime||0));
  return arr;
}

function resetLayout(){ meta.pos={}; meta.layoutMode='fit'; saveMeta(); render(); toast('↺ Layout reset — fitted to screen'); }

function restoreLayout(){ if(!meta.savedLayout){toast('No saved layout yet');return;} meta.pos=JSON.parse(JSON.stringify(meta.savedLayout)); meta.layoutMode='custom'; saveMeta(); render(); toast('↩ Layout restored'); }
function panelRects(exceptId){ const b=document.getElementById('board'); const out=[];
  [...b.children].forEach(p=>{ if(!p.classList.contains('panel'))return; const id=p.dataset.section; if(id===exceptId)return;
    out.push({x:parseInt(p.style.left)||0,y:parseInt(p.style.top)||0,w:p.offsetWidth,h:p.offsetHeight}); }); return out; }
function rectsOverlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
// Snap the dragged panel to the column grid — it STAYS where you dropped it;
// anything it lands on gets relocated instead (see resolveAllOverlaps).
function snapAndResolve(p,id){
  const COL=252,GAP=12;
  let x=parseInt(p.style.left)||0, y=parseInt(p.style.top)||0, w=p.offsetWidth;
  x=Math.max(GAP, Math.round((x-GAP)/(COL+GAP))*(COL+GAP)+GAP);
  y=Math.max(8, Math.round(y/16)*16);
  p.style.left=x+'px'; p.style.top=y+'px';
  return {x,y,w};
}
// Find the nearest free spot for a panel — prefer ABOVE the fold, near where it was.
function boardViewH(){ const b=document.getElementById('board'); return Math.max(300, window.innerHeight - b.getBoundingClientRect().top - 16); }
function findSpot(w,h,placed,prefX,prefY,bw){
  const GAP=12,COL=252, viewH=boardViewH();
  const cols=Math.max(1,Math.floor((bw-GAP)/(COL+GAP)));
  let best=null;
  for(let k=0;k<cols;k++){
    const x=GAP+k*(COL+GAP); if(x+w>bw-2) continue;
    let y=8,g=0;
    while(g++<400){ const r={x,y,w,h}; const hit=placed.find(q=>rectsOverlap(r,q)); if(!hit)break; y=hit.y+hit.h+GAP; }
    const belowFold=(y+h>viewH)?1:0;
    const score=belowFold*100000 + Math.abs(x-prefX)*1.5 + Math.abs(y-prefY);
    if(!best||score<best.score) best={x,y,score};
  }
  return best||{x:GAP,y:8};
}
// Global guarantee: NO overlaps, nothing off the right edge, and panels stay
// ON SCREEN whenever there's room — displaced panels find the nearest free
// column slot instead of being shoved below the fold.
// priorityId (the panel you just dragged) is placed first and never moved.
function resolveAllOverlaps(priorityId){
  const board=document.getElementById('board'); const GAP=12; const bw=board.clientWidth;
  const arr=[...board.children].filter(p=>p.classList.contains('panel')).map(p=>({p,id:p.dataset.section,x:parseInt(p.style.left)||0,y:parseInt(p.style.top)||0,w:p.offsetWidth,h:p.offsetHeight}));
  arr.forEach(o=>{ if(o.w>bw-2*GAP)o.w=bw-2*GAP; if(o.x+o.w>bw-GAP)o.x=Math.max(GAP,bw-GAP-o.w); if(o.x<GAP)o.x=GAP; });
  const placed=[];
  const put=o=>{ placed.push(o); o.p.style.left=o.x+'px'; o.p.style.top=o.y+'px'; o.p.style.width=o.w+'px';
    if(o.id){ meta.pos[o.id]=meta.pos[o.id]||{}; meta.pos[o.id].x=o.x; meta.pos[o.id].y=o.y; meta.pos[o.id].w=o.w; } };
  const pri=priorityId?arr.find(o=>o.id===priorityId):null;
  if(pri) put(pri);
  arr.filter(o=>o!==pri).sort((a,b)=>a.y-b.y||a.x-b.x).forEach(o=>{
    if(placed.some(q=>rectsOverlap(o,q))){ const s=findSpot(o.w,o.h,placed,o.x,o.y,bw); o.x=s.x; o.y=s.y; }
    put(o);
  });
  saveMeta(); adjustBoardHeight();
}
// Fit EVERY panel into the visible window as sized cells — the page never scrolls.
// Content that doesn't fit a cell scrolls inside that panel.
function fitToScreen(silent){
  const board=document.getElementById('board'); const GAP=10;
  const all=[...board.children].filter(p=>p.classList.contains('panel'));
  if(!all.length) return;
  // Done / Don't care / Auto-sort collapse to a one-line bottom strip
  const micro=all.filter(p=>p.classList.contains('micro'));
  const panels=all.filter(p=>!p.classList.contains('micro'));
  const n=panels.length;
  const availW=board.clientWidth-GAP;
  const MH=micro.length?40+GAP:0;
  const availH=Math.max(240, window.innerHeight - board.getBoundingClientRect().top - GAP - 6) - MH;
  // Columns target the ORIGINAL 252px width — score punishes wider cells too.
  let best={cols:Math.ceil(Math.sqrt(n)),score:-1};
  for(let cols=1; cols<=Math.min(n,10); cols++){
    const rows=Math.ceil(n/cols);
    const cw=availW/cols-GAP, ch=availH/rows-GAP;
    if(cw<170||ch<105) continue;                            // unusably small
    const score=Math.min(cw/252,252/cw)*Math.min(ch/250,1); // peak at 252px-wide cells
    if(score>best.score) best={cols,score};
  }
  const cols=best.cols, rows=Math.ceil(n/cols);
  const cw=Math.min(300, Math.floor(availW/cols)-GAP), ch=Math.floor(availH/rows)-GAP;   // hard cap: never fat
  panels.forEach((p,i)=>{ const c=i%cols, r=Math.floor(i/cols);
    const x=GAP+c*(cw+GAP), y=GAP+r*(ch+GAP);
    p.style.left=x+'px'; p.style.top=y+'px'; p.style.width=cw+'px'; p.style.height=ch+'px';
    const b=p.querySelector('.panel-body'); if(b){ b.style.maxHeight='none'; b.style.overflowY='auto'; }
    const id=p.dataset.section; if(id) meta.pos[id]={x,y,w:cw,h:ch}; });
  if(micro.length){ const mw=Math.floor(availW/micro.length)-GAP, my=GAP+rows*(ch+GAP);
    micro.forEach((p,i)=>{ const x=GAP+i*(mw+GAP);
      p.style.left=x+'px'; p.style.top=my+'px'; p.style.width=mw+'px'; p.style.height='40px';
      const id=p.dataset.section; if(id) meta.pos[id]={x,y:my,w:mw,h:40}; }); }
  board.style.height=(availH+MH)+'px';
  meta.layoutMode='fit'; saveMeta();
  if(!silent) toast('⛶ Fit to screen');
}
function adjustBoardHeight(){
  const board=document.getElementById('board'); let mb=0;
  [...board.children].forEach(p=>{ if(p.classList.contains('panel')) mb=Math.max(mb,(parseInt(p.style.top)||0)+p.offsetHeight); });

function layoutFreeform(board){
  meta.pos=meta.pos||{};
  const W=252,GAP=12; const cols=Math.max(1,Math.floor((board.clientWidth-GAP)/(W+GAP)));
  const panels=[...board.children].filter(p=>p.classList.contains('panel'));
  const wire=(p,id)=>{ p.style.position='absolute'; p.style.resize='horizontal'; p.style.overflow='hidden';
    const head=p.querySelector('.panel-head'); if(head){ const dh=head.querySelector('.drag-handle'); if(dh)dh.draggable=false; enablePanelDrag(p,head,id); } enablePanelResizeSave(p,id); };
  let idx=0;
  panels.forEach(p=>{ const id=p.dataset.section; if(id==='bulb')return;
    let pos=meta.pos[id]; if(!pos){ const col=idx%cols,row=Math.floor(idx/cols); pos={x:GAP+col*(W+GAP),y:14+row*290,w:W}; meta.pos[id]=pos; }
    p.style.left=pos.x+'px'; p.style.top=pos.y+'px'; p.style.width=(pos.w||W)+'px';
    if(pos.h){ p.style.height=pos.h+'px'; const b=p.querySelector('.panel-body'); if(b)b.style.maxHeight='none'; }
    wire(p,id); idx++; });
  // the opened bulb: keep it where you last put it, but never let it overlap
  const bulb=panels.find(p=>p.dataset.section==='bulb');
  if(bulb){ const pos=meta.pos.bulb||{x:GAP,y:8,w:W}; bulb.style.left=pos.x+'px'; bulb.style.top=pos.y+'px'; bulb.style.width=(pos.w||W)+'px'; wire(bulb,'bulb');
    if(bulb.classList.contains('flash')) meta.pos.bulb=snapAndResolve(bulb,'bulb'); }   // only re-place when freshly opened
  // default: everything fits the window (no page scroll). Once you drag a panel, your arrangement wins.
  if(meta.layoutMode==='custom') resolveAllOverlaps(); else fitToScreen(true);

function enablePanelDrag(p,head,id){
  head.style.cursor='move';
  head.addEventListener('pointerdown',e=>{
    if(e.target.closest('button,input,select,a,textarea')) return;   // let header controls work
    e.preventDefault();
    const sx=e.clientX, sy=e.clientY, px=parseInt(p.style.left)||0, py=parseInt(p.style.top)||0; let moved=false;
    const posBefore=JSON.stringify(meta.pos||{}), modeBefore=meta.layoutMode;
    p.style.zIndex=10;
    const mv=ev=>{ const dx=ev.clientX-sx, dy=ev.clientY-sy; if(Math.abs(dx)+Math.abs(dy)>4)moved=true;
      p.style.left=Math.max(0,px+dx)+'px'; p.style.top=Math.max(0,py+dy)+'px'; };
    const up=()=>{ document.removeEventListener('pointermove',mv); document.removeEventListener('pointerup',up); p.style.zIndex='';
      if(moved){ pushUndo('panel move',async()=>{ meta.pos=JSON.parse(posBefore); meta.layoutMode=modeBefore; saveMeta(); });
        meta.layoutMode='custom'; snapAndResolve(p,id); resolveAllOverlaps(id); }
      else showCriteria(id); };
    document.addEventListener('pointermove',mv); document.addEventListener('pointerup',up);
  });
}
function enablePanelResizeSave(p,id){
  if(p._ro)return;
  try{ const ro=new ResizeObserver(()=>{ clearTimeout(p._rt); p._rt=setTimeout(()=>{ const o=meta.pos[id]||{}; o.w=p.offsetWidth; o.x=parseInt(p.style.left)||o.x; o.y=parseInt(p.style.top)||o.y; meta.pos[id]=o; resolveAllOverlaps(); },350); }); ro.observe(p); p._ro=ro; }catch(e){}
}

function headCtrls(id,title,items){
  return `<span class="drag-handle" title="Drag to reorder" draggable="true">⋮⋮</span><h3>${title}</h3>`+
    `<button class="phead-ctrl" data-w title="Change width">⇔</button>`+
    `<button class="phead-ctrl" data-h title="Change height">↕</button>`+
    (items?`<button class="phead-ctrl" data-m title="Max shown">#${(meta.max&&meta.max[id])||''}</button>`:'')+
    (items?`<button class="mini send-list" title="Send this list">⤴</button>`:'')+
    (items?`<button class="phead-ctrl" data-pop title="Float this out to its own window">⧉</button>`:'')+
    (items?`<span class="count">${items.length}</span>`:'');
}
function wirePanel(p,head,id){
  meta.width=meta.width||{}; p.style.gridColumn='span '+(meta.width[id]||1);
  head.querySelector('[data-w]').onclick=()=>cycleWidth(id);
  const hb=head.querySelector('[data-h]'); if(hb)hb.onclick=()=>cycleHeight(id);
  const dh=head.querySelector('.drag-handle');
  dh.addEventListener('dragstart',e=>{e.stopPropagation();e.dataTransfer.setData('text/plain','panel:'+id);try{e.dataTransfer.setDragImage(p,20,20);}catch(_){}p.classList.add('dragging');});
  dh.addEventListener('dragend',()=>p.classList.remove('dragging'));
  p.addEventListener('dragover',e=>{e.preventDefault();p.classList.add('drop-hover');});
  p.addEventListener('dragleave',e=>{if(!p.contains(e.relatedTarget))p.classList.remove('drop-hover');});
  p.addEventListener('drop',()=>p.classList.remove('drop-hover'));
}
// Clickable join link for a calendar event: a URL → "Open", a phone → "Call".
function meetingLink(e){
  const url=(e.link&&/^https?:/i.test(e.link))?e.link:'';
  if(url){
    const zm=url.match(/zoom\.us\/j\/(\d+)/);       // open the Zoom APP, skip the web page
    if(zm){ const pw=(url.match(/[?&]pwd=([^&#]+)/)||[])[1]||''; const deep='zoommtg://zoom.us/join?confno='+zm[1]+(pw?'&pwd='+pw:''); return `<a class="joinbtn" href="${deep}">▶ Join</a>`; }
    return `<a class="joinbtn" href="${esc(url)}" target="_blank" rel="noopener">Open ↗</a>`;
  }
  const digits=(e.location||'').replace(/[^\d]/g,'');
  if(digits.length>=10) return `<a class="joinbtn" href="tel:${digits}">📞 Call</a>`;
  return '';
}

async function emailToTask(e){
  const t=await atCreate(e.subject.replace(/^(re|fwd?):\s*/i,''));
  if(!t) return;
  A(t.id).section='incoming'; t.sectionRemote='incoming'; saveAug();
  atPatch(t.id,{Section:'incoming',Source:'Email',NextStep:'Reply to '+e.from+(e.link?' — '+e.link:'')});
  toast('➕ Task created in Incoming'); clearEmail(e.id);
}

function calendarPanel(){
  const today=todayISO();
  const evs=calendar.filter(e=>e.date===today).sort((a,b)=>a.sort-b.sort);
  const p=document.createElement('div'); p.className='panel'; p.dataset.section='calendar';
  const head=document.createElement('div'); head.className='panel-head'; head.innerHTML=headCtrls('calendar','📅 Today',null)+`<span class="count">${evs.length}</span>`;
  p.appendChild(head); wirePanel(p,head,'calendar'); head.appendChild(calRefreshBtn());
  const body=document.createElement('div'); body.className='panel-body';
  if(!cfg.apiKey){ body.innerHTML='<div class="empty">Add your Airtable key to load the calendar.</div>'; }
  else if(!evs.length){ body.innerHTML='<div class="empty">No events for today.<br><span style="font-size:11px">Hit ⟳ to pull the latest.</span></div>'; }
  else {
    evs.forEach(e=>{const d=document.createElement('div');d.className='cal-ev';
      d.innerHTML='<div class="cal-when">'+esc(e.when)+'</div><div class="cal-title">'+esc(e.title)+'</div>'+(e.location?'<div class="cal-loc">📍 '+esc(e.location)+'</div>':'')+meetingLink(e);
      body.appendChild(d);});
    // auto-scroll so the current/next meeting is visible for a fast click-to-join
    const now=new Date(); const nowMin=now.getHours()*60+now.getMinutes();
    let cur=evs.findIndex(e=>e.sort+60>=nowMin); if(cur<0)cur=evs.length-1;
    const kids=body.querySelectorAll('.cal-ev');
    if(kids[cur]){ const key=evs[cur].title+evs[cur].when;
      if(blinkOff!==key){ kids[cur].classList.add('cal-now');
        const stop=document.createElement('button'); stop.className='joinbtn stopblink'; stop.textContent='🔕 Stop'; stop.title='Stop blinking until next refresh';
        stop.onclick=e=>{e.stopPropagation(); blinkOff=key; render();}; kids[cur].appendChild(stop); }
      setTimeout(()=>{ body.scrollTop=Math.max(0,kids[cur].offsetTop-8); },0); }
  }
  const plan=todayPlan();
  if(plan.length){ const h=document.createElement('div'); h.className='ack-h'; h.style.margin='8px 0 4px'; h.textContent='📋 To do today ('+plan.length+')'; body.appendChild(h);
    plan.forEach(t=>body.appendChild(taskEl(t,'today'))); }
  p.appendChild(body);
  p.addEventListener('drop',e=>{e.preventDefault();const d=e.dataTransfer.getData('text/plain');if(d&&d.startsWith('panel:'))reorderPanels(d.slice(6),'calendar');});
  return p;
}

function ideasPanel(){
  const useAT=!!cfg.apiKey;
  meta.ideas=meta.ideas||[];
  const byNewest=(a,b)=>new Date(b.createdTime||0)-new Date(a.createdTime||0);   // most recent first
  const active = useAT ? improvements.filter(i=>i.status!=='Done').sort(byNewest)
                       : meta.ideas.map((it,i)=>({id:i,note:it.text}));
  const doneItems = useAT ? improvements.filter(i=>i.status==='Done').sort(byNewest) : null;
  const done   = useAT ? doneItems.map(i=>i.note) : CHANGELOG;
  const numMap={}; const fmtD=iso=>{try{return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric'});}catch(e){return'';}};
  if(useAT)[...improvements].sort((a,b)=>new Date(a.createdTime||0)-new Date(b.createdTime||0)).forEach((i,idx)=>numMap[i.id]=idx+1);
  const pre=it=>useAT?('#'+numMap[it.id]+' · '+fmtD(it.createdTime)+' — '):'';
  const p=document.createElement('div'); p.className='panel'; p.dataset.section='ideas';
  const head=document.createElement('div'); head.className='panel-head'; head.innerHTML=headCtrls('ideas','💡 Improvements & Changes',null)+`<span class="count">${active.length}</span>`;
  p.appendChild(head); wirePanel(p,head,'ideas');
  const body=document.createElement('div'); body.className='panel-body';
  // add box — saves to the Airtable Improvements table so Claude reads it directly
  const add=document.createElement('div'); add.className='add-inline';
  add.innerHTML='<input placeholder="Note a change / improvement…"><button class="submit-sm">Submit</button>';
  const go=async()=>{const inp=add.querySelector('input');const v=inp.value.trim();if(!v)return;inp.value='';
    if(useAT){ await createImprovement(v); } else { meta.ideas.unshift({text:v,at:Date.now()}); saveMeta(); }
    render(); const n=document.querySelector('.panel[data-section="ideas"] .add-inline input'); if(n)n.focus();};
  add.querySelector('button').onclick=go; add.querySelector('input').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  body.appendChild(add);
  // active notes (top)
  active.forEach(it=>{const d=document.createElement('div');d.className='idea';d.innerHTML='<span>'+esc(pre(it)+it.note)+'</span>';
    if(useAT){const sp=d.querySelector('span');sp.style.cursor='pointer';sp.title='Open — augment / reopen';sp.onclick=()=>openImprovement(it);}
    const del=document.createElement('button');del.textContent='✕';
    del.onclick=async()=>{ if(useAT){await deleteImprovement(it.id);} else {meta.ideas.splice(it.id,1);saveMeta();} render(); };
    d.appendChild(del);body.appendChild(d);});
  // acknowledged (bottom)
  if(done.length){
    const ack=document.createElement('div'); ack.className='ack-block';
    const closed = meta.ackCollapsed!==false;   // default CLOSED
    const h=document.createElement('div'); h.className='ack-h'; h.style.cursor='pointer';
    h.textContent=(closed?'▸':'▾')+' ✓ Addressed by Claude ('+done.length+')';
    h.onclick=()=>{ meta.ackCollapsed = closed?false:true; saveMeta(); render(); };
    ack.appendChild(h);
    if(!closed){ const l=document.createElement('div');
      (useAT?doneItems:done).forEach(o=>{const di=document.createElement('div');di.className='ack-i';di.textContent='✓ '+(useAT?(pre(o)+o.note):o);
        if(useAT){di.style.cursor='pointer';di.title='Open — see / augment / reopen';di.onclick=()=>openImprovement(o);} l.appendChild(di);});
      ack.appendChild(l); meta.ackSeen=done.length; saveMeta(); }
    body.appendChild(ack);
  }
  p.appendChild(body);
  p.addEventListener('drop',e=>{e.preventDefault();const d=e.dataTransfer.getData('text/plain');if(d&&d.startsWith('panel:'))reorderPanels(d.slice(6),'ideas');});
  return p;
}

// 🎲 A different project every day — seeded by the date so it's stable all day.
function spotlightPanel(){
  const projs=[...new Set(tasks.filter(t=>t.status==='Open'&&t.project).map(t=>t.project))].sort();
  let name='', items=[];
  if(projs.length){
    const seed=[...todayISO()].reduce((a,c)=>a*31+c.charCodeAt(0),7)>>>0;
    name=projs[seed%projs.length];
    items=tasks.filter(t=>t.status==='Open'&&t.project===name&&notSnoozed(t));
  }
  return panelEl('spotlight','🎲 '+(name||'Spotlight'),items,false);
}
const MICRO=new Set(['done','dontcare','autosort']);
function panelEl(sectionId,title,items,isDrop){
  const p=document.createElement('div'); p.className='panel'+(MICRO.has(sectionId)?' micro':''); p.dataset.section=sectionId;
  const head=document.createElement('div'); head.className='panel-head'; head.innerHTML=headCtrls(sectionId,title,items);
  p.appendChild(head); wirePanel(p,head,sectionId);
  head.querySelector('.send-list').onclick=()=>sendList(title,items);
  head.querySelector('[data-m]').onclick=()=>setMax(sectionId);
  const pb=head.querySelector('[data-pop]'); if(pb)pb.onclick=()=>popOut(sectionId,title);
  if(SECTION_SUB[sectionId]){ const s=document.createElement('div'); s.className='panel-sub'; s.textContent=SECTION_SUB[sectionId]; p.appendChild(s); }
  const body=document.createElement('div'); body.className='panel-body';
  const hp=heightPx(sectionId)||((sectionId==='done'||sectionId==='dontcare'||sectionId==='autosort')?'70px':null);
  if(hp) body.style.maxHeight=hp;   // panels otherwise auto-size to their content (align-items:start)

  const list=orderRows(items,sectionId);
  const max=(meta.max&&meta.max[sectionId])||0;
  const shown=(max&&list.length>max&&!expanded.has(sectionId))?list.slice(0,max):list;
  if(!list.length){ const e=document.createElement('div'); e.className='empty'; e.textContent=sectionId==='done'?'🗑 drop to complete':sectionId==='dontcare'?'🚫 drop to ignore':sectionId==='autosort'?'🔮 drop to auto-sort':'—'; body.appendChild(e); }
  shown.forEach(t=>body.appendChild(taskEl(t,sectionId)));
  if(max&&list.length>max){
    const mb=document.createElement('button'); mb.className='more-btn';
    mb.textContent=expanded.has(sectionId)?'Show less':('+'+(list.length-max)+' more');
    mb.onclick=()=>{ expanded.has(sectionId)?expanded.delete(sectionId):expanded.add(sectionId); render(); };
    body.appendChild(mb);
  }

  if(isDrop && sectionId!=='done' && sectionId!=='dontcare' && sectionId!=='autosort'){   // add bubble at the BOTTOM of each real section
    const add=document.createElement('div'); add.className='add-inline';
    add.innerHTML='<input placeholder="Add…"><button>＋</button>';
    const go=async()=>{const inp=add.querySelector('input');const v=inp.value.trim();if(!v)return;inp.value='';const t=await atCreate(v);if(t){A(t.id).section=sectionId;if(sectionId==='calls')A(t.id).type='call';saveAug();render(); const n=document.querySelector('.panel[data-section="'+sectionId+'"] .add-inline input'); if(n)n.focus();}};
    add.querySelector('button').onclick=go; add.querySelector('input').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
    body.appendChild(add);
  }
  p.appendChild(body);

  p.addEventListener('drop',e=>{e.preventDefault();
    const d=e.dataTransfer.getData('text/plain'); if(!d||d==='chip')return;
    if(d.startsWith('panel:')){ reorderPanels(d.slice(6),sectionId); return; }
    if(isDrop){
      if(sectionId==='done'){ const t=tasks.find(x=>x.id===d); if(t)markDone(t); return; }
      if(sectionId==='dontcare'){ const pv=A(d).snoozeUntil; const tt=tasks.find(x=>x.id===d);
        pushUndo('snooze month: '+(tt?cleanName(tt):d),async()=>{ A(d).snoozeUntil=pv; });
        A(d).snoozeUntil=Date.now()+30*86400000; touch(d); saveAug(); toast('🚫 Snoozed a month'); render(); return; }
      if(sectionId==='autosort'){ const t=tasks.find(x=>x.id===d); if(t){const g=guessCategory(t);
        if(g.project){t.project=g.project;atPatch(t.id,{Project:g.project});}
        if(g.lead){t.lead=g.lead;atPatch(t.id,{SBLead:g.lead});}
        A(d).section='backlog'; touch(d); saveAug();
        toast((g.project||g.lead)?('Sorted → '+[g.project,g.lead].filter(Boolean).join(' / ')):'No confident guess'); }
        render(); return; }
      setSection(d,sectionId); if(sectionId==='calls'){A(d).type='call'; const rt=tasks.find(x=>x.id===d); if(rt)rt.typeRemote='call'; atPatch(d,{Type:'call'});} touch(d); render();
    }
  });
  return p;
}

function taskEl(t,sectionId){
  const a=A(t.id); const el=document.createElement('div');
  el.className='task'+((a.blink||autoBlinkOn(t,sectionId))?' blink':'')+(sectionOf(t)==='bigticket'?' bigtix':''); el.draggable=true;
  el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',t.id);el.classList.add('dragging');});
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  // drop a task onto this one to resort within the section (or move + place)
  el.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();el.classList.add('drop-before');});
  el.addEventListener('dragleave',()=>el.classList.remove('drop-before'));
  el.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();el.classList.remove('drop-before');

  const datb=document.createElement('button'); datb.className='masb'+(doDateOf(t)?' on':''); datb.textContent='📅'; datb.title=doDateOf(t)?('Scheduled '+doDateOf(t)):'Schedule for a date';

}
function btn(txt,cls,title,fn){const b=document.createElement('button');b.className=cls;b.textContent=txt;b.title=title;b.onclick=e=>{e.stopPropagation();fn();};return b;}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
// Display name: drop the "(V5-###)" id and prefix the project for context.
// Snooze = push it out 10 days (hides it, and moves its date out 10 days).
function snoozeTask(id){
  const t=tasks.find(x=>x.id===id);
  const prev={sn:A(id).snoozeUntil,dd:doDateOf(t||{id})};
  pushUndo('snooze: '+(t?cleanName(t):id),async()=>{ A(id).snoozeUntil=prev.sn; setDoDate(id,prev.dd||''); });
  const ms=Date.now()+10*86400000, d=new Date(ms);
  const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  A(id).snoozeUntil=ms; setDoDate(id,iso); saveAug(); toast('😴 Snoozed 10 days'); render();
}
// P/L/S quick-assign: pick from existing values (or type a new one).

// "C" — move a task into Calls (syncs via Type + Section).
function setCall(id){

// Now/Focus + Next Up always nag: their items blink unless snoozed (snooze lasts 5 min).
function autoBlinkOn(t,sectionId){ return (sectionId==='focus'||sectionId==='nextup') && !(A(t.id).blinkSnoozeUntil>Date.now()); }
function cleanName(t){ return (t.name||'').replace(/\s*\(V\d+-\d+\)\s*$/i,'').trim()||'(untitled)'; }
function displayName(t){ return (t.project?t.project+' - ':'')+cleanName(t); }
function doDateOf(t){ return t.doDate || A(t.id).doDate || ''; }

function setDoDate(id,dateStr){ const a=A(id); a.doDate=dateStr||''; const t=tasks.find(x=>x.id===id); if(t)t.doDate=dateStr||''; saveAug(); atPatch(id,{DoDate:dateStr||''}); }
function todayPlan(){ const td=todayISO(); return tasks.filter(t=>t.status==='Open' && doDateOf(t) && doDateOf(t)<=td).sort((a,b)=>doDateOf(a).localeCompare(doDateOf(b))); }
function isCallTask(t){ return t.typeRemote==='call' || t.sectionRemote==='calls' || A(t.id).type==='call' || /^\s*call\b/i.test(t.name||''); }
// Calls you already handled, so you can look back at previous days' call lists.
function pastCalls(){ const cut=Date.now()-14*86400000;
  return tasks.filter(t=>t.status==='Done' && isCallTask(t) && t.updatedAt && new Date(t.updatedAt).getTime()>=cut)
    .sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)); }

/* ---------- Filters UI ---------- */
function countsFor(dim){
  const counts={}; tasks.filter(t=>t.status==='Open').forEach(t=>{const v=t[dim];if(v)counts[v]=(counts[v]||0)+1;});
  return counts;
}
function orderedVals(dim,counts){
  const all=Object.keys(counts);
  const ord=(meta.chipOrder&&meta.chipOrder[dim])||[];
  const inOrd=ord.filter(v=>counts[v]!=null);
  const rest=all.filter(v=>!inOrd.includes(v)).sort((a,b)=>counts[b]-counts[a]);
  return [...inOrd,...rest];
}
function reorderChip(dim,from,to){
  let ord=orderedVals(dim,countsFor(dim)).filter(v=>v!==from);
  const i=ord.indexOf(to); ord.splice(i<0?ord.length:i,0,from);
  meta.chipOrder=meta.chipOrder||{}; meta.chipOrder[dim]=ord; saveMeta(); render();
}
function renderFilters(){
  const wrap=document.getElementById('filters'); wrap.innerHTML='';
  ['project','lead','sub'].forEach(dim=>{                 // each dimension on its own line
    const g=document.createElement('div'); g.className='filter-group';
    const counts=countsFor(dim);
    const lbl=document.createElement('span'); lbl.className='lbl'; lbl.textContent=dim; g.appendChild(lbl);
    orderedVals(dim,counts).forEach(v=>g.appendChild(filterChip(dim,v,counts[v])));   // show ALL
    const addc=document.createElement('button'); addc.className='chip'; addc.textContent='＋'; addc.title='New '+dim;
    addc.onclick=()=>{ const v=prompt('New '+dim+' name:'); if(v&&v.trim()){ activeBulb={dim,val:v.trim(),label:v.trim()}; flashBulb=true; render(); } };
    g.appendChild(addc);
    wrap.appendChild(g);
  });
  // 4th line: categories (Big Ticket, Calls, etc.) — not project/lead/sub
  const cg=document.createElement('div'); cg.className='filter-group';
  const clbl=document.createElement('span'); clbl.className='lbl'; clbl.textContent='category'; cg.appendChild(clbl);
  CATEGORIES.forEach(c=>{
    const n=c.id==='stillopen'?stillOpenItems().length:c.id==='priority'?priorityList().length:c.id==='today'?todayPlan().length:c.id==='yestboard'?yesterdayBoard().length:tasks.filter(t=>t.status==='Open'&&sectionOf(t)===c.id).length;
    const b=document.createElement('button'); b.className='chip'; b.innerHTML=esc(c.name)+`<span class="n">${n}</span>`;
    b.onclick=()=>{ activeBulb={dim:'category',val:c.id,label:c.name}; flashBulb=true; render(); };
    cg.appendChild(b);
  });
  wrap.appendChild(cg);
  // 5th line: tasks by date added
  const ag=document.createElement('div'); ag.className='filter-group';
  const albl=document.createElement('span'); albl.className='lbl'; albl.textContent='added'; ag.appendChild(albl);
  ADDED_RANGES.forEach(r=>{
    const n=tasks.filter(t=>inAddedRange(t,r.key)).length;
    const b=document.createElement('button'); b.className='chip'; b.innerHTML=esc(r.name)+`<span class="n">${n}</span>`;
    b.onclick=()=>{ activeBulb={dim:'added',val:r.key,label:r.name}; flashBulb=true; render(); };
    ag.appendChild(b);
  });
  wrap.appendChild(ag);
}
function filterChip(dim,val,n){
  const c=document.createElement('button'); c.className='chip'; c.draggable=true;
  c.innerHTML=esc(val)+`<span class="n">${n}</span>`;
  c.onclick=()=>{ activeBulb={dim,val}; flashBulb=true; render(); };   // opens as a board panel next to Incoming
  c.addEventListener('dragstart',e=>{dragChip={dim,val};e.dataTransfer.setData('text/plain','chip');e.stopPropagation();});
  c.addEventListener('dragover',e=>e.preventDefault());
  c.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();if(dragChip&&dragChip.dim===dim){reorderChip(dim,dragChip.val,val);}dragChip=null;});
  return c;
}

/* ---------- Actions ---------- */
async function markDone(t){
  const prev={sec:A(t.id).section,secR:t.sectionRemote};
  pushUndo('done: '+cleanName(t),async()=>{ t.status='Open'; A(t.id).section=prev.sec; t.sectionRemote=prev.secR; await atPatch(t.id,{Status:'Open',Section:prev.secR||prev.sec||''}); });
  t.status='Done'; A(t.id).section=null; t.sectionRemote=''; saveAug(); render(); await atPatch(t.id,{Status:'Done',Section:''}); toast('✅ Done'); }
function editNext(t){
  openModal(`Next step for "${t.name}"`, `
    <label class="field"><span class="lbl">What to do (free text — I'll act on it)</span>
      <textarea class="inp" id="ns" placeholder="e.g. Text Gary about the quote">${esc(A(t.id).nextStep||'')}</textarea></label>
    <label class="field"><span class="lbl">Type</span>
      <select class="inp" id="nt">
        <option value="">—</option><option value="text">Text</option><option value="email">Email</option>
        <option value="call">Call</option><option value="follow">Follow up</option>
      </select></label>
    <div class="note">Tip: leave a type and it routes to the right button. "Follow up" keeps nagging until you mark it done.</div>`,
    ()=>{const v=document.getElementById('ns').value.trim();const ty=document.getElementById('nt').value;
      const a=A(t.id); a.nextStep=v; if(ty)a.type=ty; if(ty==='follow')a.awaiting=true; touch(t.id); saveAug(); render();});
  // suggestion (tiny "learning" heuristic)
  setTimeout(()=>{const g=guessNext(t); if(g&&!A(t.id).nextStep){const el=document.getElementById('ns'); if(el&&!el.value)el.placeholder='Suggested: '+g;}},0);
}
function guessNext(t){
  const n=(t.name||'').toLowerCase();
  if(n.startsWith('call')) return 'Call '+(t.lead||'them');
  if(n.startsWith('email')) return 'Email '+(t.lead||'them');
  if(n.startsWith('text')||n.startsWith('whatsapp')) return 'Text '+(t.lead||'them');
  if(t.lead) return 'Follow up with '+t.lead;
  return null;
}
// "Learning" v1: guess project/lead for an unsorted task by matching the most
// similar already-categorized task (shared keywords). Opens for your approval.
function guessCategory(t){
  const words=(t.name||'').toLowerCase().split(/[^a-z0-9]+/).filter(w=>w.length>3);
  let best=null,score=0;
  for(const o of tasks){
    if(o.id===t.id || (!o.project&&!o.lead)) continue;
    const ow=(o.name||'').toLowerCase(); let s=0; words.forEach(w=>{if(ow.includes(w))s++;});
    if(s>score){score=s;best=o;}
  }
  return (best&&score>0)?{project:t.project||best.project,lead:t.lead||best.lead}:{};
}
function sendText(t){
  const body=A(t.id).nextStep||t.name; const ph=phoneFor(t);
  window.open('sms:'+(ph||'')+'&body='+encodeURIComponent(body),'_blank');
  A(t.id).awaiting=true; touch(t.id); saveAug();
}
function sendEmail(t){
  const body=A(t.id).nextStep||t.name;
  window.open('mailto:?subject='+encodeURIComponent(t.name)+'&body='+encodeURIComponent(body),'_blank');
  A(t.id).awaiting=true; touch(t.id); saveAug();
}

  bd.querySelector('[data-blink]').onclick=()=>{const aa=A(t.id);aa.blink=!aa.blink;saveAug();bd.remove();render();toast(aa.blink?'🔔 Blinking':'🔕 Off');};
  bd.querySelector('[data-del]').onclick=async()=>{ if(!confirm('Delete this task?'))return; bd.remove();
    const snap={name:t.name,project:t.project,lead:t.lead,sub:t.sub,sec:sectionOf(t),next:a.nextStep||t.nextStepRemote,phone:phoneFor(t),aug:JSON.stringify(aug[t.id]||{})};
    pushUndo('delete: '+cleanName(t),async()=>{ const nt=await atCreate(snap.name); if(!nt)return;
      aug[nt.id]=JSON.parse(snap.aug); await atPatch(nt.id,{Project:snap.project||'',SBLead:snap.lead||'',Sub:snap.sub||'',Section:snap.sec||'',NextStep:snap.next||'',Phone:snap.phone||''});
      Object.assign(nt,{project:snap.project,lead:snap.lead,sub:snap.sub,sectionRemote:snap.sec}); });
    tasks=tasks.filter(x=>x.id!==t.id); delete aug[t.id]; saveAug(); render(); await atDelete(t.id); toast('Deleted'); };
  bd.querySelector('[data-ok]').onclick=async()=>{
    const g=id=>bd.querySelector(id).value.trim();
    t.name=g('#d_name'); t.project=g('#d_proj'); t.lead=g('#d_lead'); t.sub=g('#d_sub');
    a.section=g('#d_sec'); a.nextStep=g('#d_next'); touch(t.id); saveAug(); bd.remove(); render();
    await atPatch(t.id,{Task:t.name,Project:t.project,SBLead:t.lead,Sub:t.sub}); toast('Saved');
  };
  document.body.appendChild(bd); bd.querySelector('#d_name').focus();
}

/* ---------- Send a whole list ---------- */
function sendList(title,items){
  if(!items.length){ toast('Nothing in this list'); return; }
  const body=title.replace(/^[^\w]+/,'')+':\n'+items.map((t,i)=>(i+1)+'. '+t.name).join('\n');
  const bd=document.createElement('div'); bd.className='backdrop';
  bd.innerHTML=`<div class="modal"><h3>Send "${esc(title)}"</h3>
    <textarea class="inp" id="sl" style="min-height:140px">${esc(body)}</textarea>
    <div class="modal-actions"><button class="btn ghost" data-x>Cancel</button>
    <button class="btn" data-sms>💬 Text</button><button class="btn primary" data-mail>✉️ Email</button></div></div>`;
  bd.addEventListener('click',e=>{if(e.target===bd)bd.remove();});
  bd.querySelector('[data-x]').onclick=()=>bd.remove();
  bd.querySelector('[data-sms]').onclick=()=>{window.open('sms:&body='+encodeURIComponent(bd.querySelector('#sl').value),'_blank');bd.remove();};
  bd.querySelector('[data-mail]').onclick=()=>{window.open('mailto:?subject='+encodeURIComponent(title)+'&body='+encodeURIComponent(bd.querySelector('#sl').value),'_blank');bd.remove();};
  document.body.appendChild(bd);
}

/* ---------- Add / photo ---------- */
// The floating + button: tap, type, Enter → straight into Incoming (appears instantly).
function addTask(){
  const bd=document.createElement('div'); bd.className='backdrop';
  const box=document.createElement('div'); box.className='modal';
  box.innerHTML='<h3>➕ Add to Incoming</h3>';
  const inp=document.createElement('input'); inp.className='inp'; inp.placeholder='What needs doing?'; inp.style.cssText='width:100%;margin-top:8px'; box.appendChild(inp);
  const add=async()=>{const v=inp.value.trim(); if(!v){bd.remove();return;} inp.value=''; bd.remove(); const t=await atCreate(v); if(t){A(t.id).section='incoming';saveAug();render();} toast('Added to Incoming');};
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')add(); if(e.key==='Escape')bd.remove();});
  const act=document.createElement('div'); act.className='modal-actions'; act.innerHTML='<button class="btn" data-c>Cancel</button><button class="btn primary" data-a>Add</button>';
  act.querySelector('[data-c]').onclick=()=>bd.remove(); act.querySelector('[data-a]').onclick=add; box.appendChild(act);
  bd.appendChild(box); bd.addEventListener('click',e=>{if(e.target===bd)bd.remove();}); document.body.appendChild(bd);
  setTimeout(()=>inp.focus(),30);
}
async function photoToList(file){
  if(!cfg.anthropicKey){ toast('Add an Anthropic key in ⚙︎ to read photos'); return; }
  toast('Reading photo…');
  const b64=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.readAsDataURL(file);});
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{
      'content-type':'application/json','x-api-key':cfg.anthropicKey,'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:cfg.model||'claude-haiku-4-5-20251001',max_tokens:400,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},
          {type:'text',text:'Extract action items / list items from this image. Return ONLY a JSON array of short task strings.'}]}]})});
    const d=await r.json(); const txt=(d.content||[]).map(c=>c.text||'').join('');
    const arr=JSON.parse(txt.match(/\[[\s\S]*\]/)[0]);
    for(const name of arr){ await atCreate(String(name)); }
    toast('Added '+arr.length+' items'); render();
  }catch(e){ toast('Could not read photo'); }
}

/* Float a section out into its own always-on-top browser window. It's a live
   snapshot (re-open or hit its refresh to update after changes in the app). */
function popOut(sectionId,title){
  const rows = sectionId==='stillopen' ? stillOpenItems()
             : tasks.filter(t=>t.status==='Open' && sectionOf(t)===sectionId);
  const w=window.open('','pop_'+sectionId,'width=340,height=620,menubar=no,toolbar=no');
  if(!w){ toast('Allow pop-ups to float a panel out'); return; }
  const body = rows.length
    ? rows.map(t=>`<div class="t">${esc(displayName(t))}${(t.lead||t.sub)?`<div class="m">${esc([t.lead,t.sub].filter(Boolean).join(' · '))}</div>`:''}</div>`).join('')
    : '<div class="m">Empty</div>';
  w.document.write(`<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(title)}</title>
    <style>body{margin:0;background:#14110f;color:#f5f3ee;font:14px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:12px}
    h3{margin:0 0 10px;font-size:15px} .t{background:#241f1b;border:1px solid #2c2723;border-radius:8px;padding:8px 10px;margin-bottom:6px}
    .m{color:#a8a29a;font-size:12px} .hint{color:#a8a29a;font-size:11px;margin-bottom:10px}</style>
    <h3>${esc(title)} — ${rows.length}</h3><div class="hint">Snapshot · click ⧉ in the app again to update</div>${body}`);
  w.document.close();
}

/* Bulk add — paste a list, one task per line. A first line like "YOSS 07.08.26"
   auto-sets the project for all of them. New items land in Incoming. */
function bulkAdd(){
  openModal('📋 Bulk add tasks', `
    <label class="field"><span class="lbl">Project (optional — applies to all)</span><input class="inp" id="bp" placeholder="e.g. YOSS"></label>
    <label class="field"><span class="lbl">One task per line</span><textarea class="inp" id="bl" placeholder="Paste your list here…"></textarea></label>
    <div class="note">Tip: a first line like “YOSS 07.08.26” auto-fills the project and is skipped.</div>`,
   async()=>{
     let proj=document.getElementById('bp').value.trim();
     let lines=document.getElementById('bl').value.split('\n').map(s=>s.trim()).filter(Boolean);
     if(!proj && lines.length){ const m=lines[0].match(/^([A-Za-z0-9&]{2,})\s+\d{1,2}[.\/-]\d{1,2}[.\/-]\d{2,4}$/); if(m){proj=m[1];lines=lines.slice(1);} }
     let n=0;
     for(const name of lines){ const t=await atCreate(name); if(t){ A(t.id).section='incoming'; if(proj){t.project=proj; await atPatch(t.id,{Project:proj});} n++; } }
     saveAug(); render(); toast('Added '+n+' task'+(n===1?'':'s')+(proj?' to '+proj:''));
   });
}

/* Quick link: today's meetings — dial-in + what's queued in the call sections */
function meetingsModal(){
  const today=todayISO();
  const evs=calendar.filter(e=>e.date===today).sort((a,b)=>a.sort-b.sort);

    '<div class="ack-h">📆 Calendar</div>'+evHtml+
