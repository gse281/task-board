}

/* ---------- Modal ---------- */
function openModal(title,html,onSave){
  const bd=document.createElement('div'); bd.className='backdrop';
  bd.innerHTML=`<div class="modal"><h3>${esc(title)}</h3>${html}
    <div class="modal-actions"><button class="btn ghost" data-x>Cancel</button><button class="btn primary" data-ok>Save</button></div></div>`;
  bd.addEventListener('click',e=>{if(e.target===bd)bd.remove();});
  bd.querySelector('[data-x]').onclick=()=>bd.remove();
  bd.querySelector('[data-ok]').onclick=()=>{ onSave&&onSave(); bd.remove(); };
  document.body.appendChild(bd);
  const f=bd.querySelector('input,textarea,select'); if(f)f.focus();
}
function openSettings(){
  openModal('Settings',`
    <label class="field"><span class="lbl">Airtable API key (Personal Access Token)</span><input class="inp" id="k" value="${esc(cfg.apiKey||'')}" placeholder="pat..."></label>
    <label class="field"><span class="lbl">Airtable Base ID</span><input class="inp" id="b" value="${esc(cfg.baseId)}"></label>
    <label class="field"><span class="lbl">Airtable Table ID</span><input class="inp" id="tb" value="${esc(cfg.tableId)}"></label>
    <label class="field"><span class="lbl">Anthropic API key (optional — photo→list)</span><input class="inp" id="an" value="${esc(cfg.anthropicKey||'')}" placeholder="sk-ant-..."></label>
    <div class="field" style="display:flex;gap:6px;flex-wrap:wrap"><button type="button" class="btn primary" onclick="saveLayout()">💾 Save my layout</button><button type="button" class="btn" onclick="restoreLayout()">↩ Restore saved</button><button type="button" class="btn" onclick="fitToScreen()">⛶ Fit to screen</button><button type="button" class="btn ghost" onclick="resetLayout()">↺ Reset</button></div>
    <div class="note">Keys are stored only in this browser (localStorage). Scope the Airtable token to just this base. Drag panels by their header; drag the bottom-right corner to resize.</div>`,
   ()=>{cfg.apiKey=val('k');cfg.baseId=val('b');cfg.tableId=val('tb');cfg.anthropicKey=val('an');saveCfg();atFetch();});
}
const val=id=>document.getElementById(id).value.trim();

/* ---------- Reference grid overlay ---------- */
function buildGrid(){
  const g=document.getElementById('grid'); g.innerHTML='';
  const cw=140, ch=120, cols=Math.ceil(innerWidth/cw), rows=Math.ceil(innerHeight/ch);
  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    const c=document.createElement('div'); c.className='gcell';
    c.style.cssText=`left:${x*cw}px;top:${y*ch}px;width:${cw}px;height:${ch}px`;
    const l=document.createElement('div'); l.className='glabel';
    l.style.cssText=`left:${x*cw+2}px;top:${y*ch+2}px`; l.textContent=letters[x%26]+(y+1);
    g.appendChild(c); g.appendChild(l);
  }
}

/* ---------- Wire up ---------- */
function minsSince(ms){ return ms?Math.max(0,Math.round((Date.now()-ms)/60000)):null; }
function buildMs(){ try{ return new Date(BUILD.replace(' ','T')).getTime(); }catch(e){ return 0; } }
function updateAgo(){ const bt=document.getElementById('buildTag'); if(!bt)return;
  const r=lastFetchAt?minsSince(lastFetchAt):null;
  const b=minsSince(buildMs());
  const bTxt=b==null?'—':b<180?b+'m':b<2880?Math.round(b/60)+'h':Math.round(b/1440)+'d';
  bt.textContent='🔄 '+(r==null?'—':r+'m')+' · 🔧 '+bTxt;   // data age · build age
  bt.title='Data refreshed '+(r==null?'never':r+'m ago')+' · Build '+BUILD+' ('+bTxt+' old) — click for changelog'; }
// Wrench + build details are hidden until you tap the refresh chip → opens the changelog.
function showChangelog(){
  const bd=document.createElement('div'); bd.className='backdrop';
  const box=document.createElement('div'); box.className='modal'; box.style.maxWidth='440px';
  box.innerHTML='<h3>🔧 Build &amp; changelog</h3><div style="font-size:12px;color:var(--muted);margin:2px 0 8px">Live build <b>'+esc(BUILD)+'</b> · data refreshed '+(lastFetchAt?minsSince(lastFetchAt)+'m ago':'never')+'</div>';
  const list=document.createElement('div'); list.style.cssText='max-height:60vh;overflow:auto;display:flex;flex-direction:column;gap:9px';
  CHANGES.forEach(c=>{const d=document.createElement('div');d.style.cssText='border-left:2px solid var(--accent);padding:1px 0 1px 10px';d.innerHTML='<div style="font-weight:800;font-size:12px">'+esc(c.v)+'</div><div style="font-size:12px;color:var(--muted);line-height:1.4">'+esc(c.d)+'</div>';list.appendChild(d);});
  box.appendChild(list);
  const act=document.createElement('div'); act.className='modal-actions'; act.innerHTML='<button class="btn primary" data-x>Close</button>'; act.querySelector('[data-x]').onclick=()=>bd.remove(); box.appendChild(act);
  bd.appendChild(box); bd.addEventListener('click',e=>{if(e.target===bd)bd.remove();}); document.body.appendChild(bd);
}
document.getElementById('buildTag').onclick=showChangelog;
updateAgo(); setInterval(updateAgo,30000);
setInterval(()=>{ if(cfg.apiKey) atFetch(); }, 30*60*1000);   // auto-refresh data every 30 min
setInterval(()=>{ if(!document.querySelector('.backdrop')) render(); }, 60000);   // re-check blink snoozes (~1 min)
// Pull down at the top of the page: a SLOW pull reveals the filters/Incoming drawer,
// a FAST pull (flick) reloads. Velocity = distance / time separates the two.
(function(){ let sy=0, st=0, pulling=false; const ind=document.createElement('div'); ind.id='ptr'; ind.textContent='↓ Pull down'; document.body.appendChild(ind);
  addEventListener('touchstart',e=>{ pulling = (window.scrollY<=0); sy=e.touches[0].clientY; st=Date.now(); },{passive:true});
  addEventListener('touchmove',e=>{ if(!pulling)return; const dy=e.touches[0].clientY-sy; if(dy>0){ ind.style.top=Math.min(50,dy-40)+'px';
    const fast=dy/Math.max(1,Date.now()-st) > 0.7;
    ind.textContent = dy<55 ? '↓ Pull down' : fast ? '↻ Release to refresh' : '⌄ Release for filters'; } },{passive:true});
  addEventListener('touchend',e=>{ if(!pulling)return; pulling=false; const dy=e.changedTouches[0].clientY-sy; const dt=Math.max(1,Date.now()-st); ind.style.top='-56px';
    if(dy<=55) return;
    if(dy/dt>0.7 && dy>80){ location.reload(); }                    // fast flick → refresh
    else { mobileDrawerOpen=true; render(); const d=document.getElementById('topDrawer'); if(d)d.scrollIntoView({behavior:'smooth',block:'start'}); }   // slow pull → reveal drawer
  });
})();
document.getElementById('search').addEventListener('input',e=>{query=e.target.value;renderSearch();});
document.addEventListener('click',e=>{ if(!e.target.closest('#searchResults')&&e.target.id!=='search'){const b=document.getElementById('searchResults'); if(b)b.classList.add('hidden');} });
function renderSearch(){
  const box=document.getElementById('searchResults'); const q=query.trim().toLowerCase();
  if(!q){ box.classList.add('hidden'); box.innerHTML=''; return; }
  const matches=tasks.filter(t=>t.status==='Open' && (t.name+' '+t.project+' '+t.lead+' '+t.sub).toLowerCase().includes(q)).slice(0,60);
  box.innerHTML = matches.length
    ? matches.map(t=>`<div class="sr" data-id="${t.id}"><div>${esc(displayName(t))}</div><div class="m">${esc([t.lead,t.sub].filter(Boolean).join(' · '))||'—'}</div></div>`).join('')
    : '<div class="sr m">No matches</div>';
  box.classList.remove('hidden');
  box.querySelectorAll('.sr[data-id]').forEach(el=>el.onclick=()=>{const t=tasks.find(x=>x.id===el.dataset.id); box.classList.add('hidden'); document.getElementById('search').value=''; query=''; if(t)openDetail(t);});
}
document.getElementById('undoBtn').onclick=undoLast;
document.addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='z'&&!e.target.closest('input,textarea,select')){ e.preventDefault(); undoLast(); } });
document.getElementById('refreshBtn').onclick=()=>location.reload();   // full reload, like the address bar
document.getElementById('settingsBtn').onclick=openSettings;
document.getElementById('addBtn').onclick=addTask;
document.getElementById('picBtn').onclick=()=>document.getElementById('picInput').click();
document.getElementById('meetBtn').onclick=meetingsModal;
document.getElementById('bulkBtn').onclick=bulkAdd;
document.getElementById('picInput').onchange=e=>{if(e.target.files[0])photoToList(e.target.files[0]);};
document.getElementById('gridBtn').onclick=()=>{const g=document.getElementById('grid');g.classList.toggle('on');document.getElementById('gridBtn').classList.toggle('on',g.classList.contains('on'));if(g.classList.contains('on'))buildGrid();};
let _rsT; addEventListener('resize',()=>{if(document.getElementById('grid').classList.contains('on'))buildGrid(); clearTimeout(_rsT); _rsT=setTimeout(render,200);});

/* first load: render, then fetch; auto-refresh once/day */
// One-time layout migration: old builds saved fat panel widths — wipe them so
// the new 252px fit takes over. (Bump LAYOUT_VER to force a re-fit everywhere.)
const LAYOUT_VER=2;
if(meta.layoutVer!==LAYOUT_VER){ meta.pos={}; meta.layoutMode='fit'; meta.layoutVer=LAYOUT_VER; saveMeta(); }
dailyReset();
if(cfg.apiKey){ render(); atFetch(); }
else { tasks=demoTasks(); render(); toast('⚠️ DEMO data — paste your Airtable key to load your real tasks'); openSettings(); }
</script>
